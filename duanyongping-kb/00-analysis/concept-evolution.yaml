    phases:
    - period: 2010-2012
      summary: 早期（2010-2012）：在网易博客中系统阐述，将「买股票就是买公司」作为投资核心理念的第一条，与「未来现金流折现」「能力圈」等一同构成投资框架。
    - period: 2012-2018
      summary: 中期（2012-2018）：在《投资的信仰》中将此概念升华为「信仰」，强调「买股票就是买公司，句号！」。
    - period: 2019-2026
      summary: 近期（2019-2026）：在雪球访谈中反复确认，表述始终一致从未改变。2025年与方三文对话中再次强调这就是其投资理念的全部精髓。
    representative_quotes:
    - '"买股票就是买公司，买公司就是买公司的未来现金流折现，句号！这就是我说的所谓的信仰的意思，或者说我是从骨子里相信，不会因为任何影响而动摇。"'
    - '"直到我看了老巴（巴菲特）的东西，其实啥也没看，就看到那一句话：''买股票就是买公司''。我就突然明白了，这句话就够了。"'
    - '"用一句话来概括你的投资理念的话，是不是就是''买股票就是买公司''？是的，没有了，这就够了。但是后面那句话是：你要看懂公司。这个很难。"'
    related_concepts:
    - 未来现金流折现
    - 能力圈
    - right business right people right price
    related_companies:
    - 网易
    - 苹果
