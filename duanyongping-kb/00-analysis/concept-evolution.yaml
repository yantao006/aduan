    - period: 2013-2018
      summary: 中期（2013-2018）：2018年斯坦福交流中提出「诚实对自己」的能力圈定义，将安全边际与能力圈融合，提出「安全边际实际上应该是能力圈而不仅仅是价格」的创新解读。
    - period: 2019-2026
      summary: 近期（2019-2026）：能力圈范围逐渐扩大（开始研究英伟达），但核心原则不变。2025年访谈中频繁引用，强调「看不懂就不碰」。
    representative_quotes:
    - '"知道自己的能力圈有多大往往比自己能力圈有多大要重要的多！"'
    - '"能力圈不是拿金箍棒在地上画个圈，说待在里面不要出去，外面有妖怪。能力圈是：诚实对自己，知之为知之，不知为不知。"'
    - '"不懂不做是一个人判断公司内在价值的必要前提（不是充分的）。"'
