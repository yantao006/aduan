      summary: 早期（2010-2012）：将巴菲特名言引入投资框架，用网易案例证明「别人恐惧时贪婪」的有效性。此时更多是引用和实践。
    - period: 2013-2018
      summary: 中期（2013-2018）：反复强调「做起来不容易」，开始警示恐惧时贪婪的前提条件——闲钱和真懂。区分真懂和自以为懂。
    - period: 2019-2025
      summary: 近期（2019-2025）：2025年访谈中通过茅台波动案例再次验证理念。将「理性」「平常心」「信仰」等概念与贪婪恐惧框架融合，形成更完整的情绪管理观。
    representative_quotes:
