      summary: 中期（2005-2018）：沈炜在2015年20周年讲话中系统阐述本分的九个维度，将其从单一诚信概念升华为企业核心方法论。段永平在斯坦福提出「本分+平常心」的成功公式。
    - period: 2018-2026
      summary: 近期（2018-2026）：本分与平常心、做对的事情深度融合，成为个人和企业的共同行为准则。沈炜在30周年提出「本分是自觉自悟的深刻修炼」，从外在要求变为内在觉醒。
    representative_quotes:
    - 「我们做企业最根本的东西，就是本分。说话要算数，是一种本分。守信誉不是给人看的，为了一个承诺去赔钱，可能很多企业家会赖帐，但我会毫不犹豫地践诺。」（2000年销售手册前言）
    - 「企业不要什么钱都赚，这是一种本分。企业应该有道德，有自己的原则。有些生意哪怕再赚钱，如果违背自己做企业的原则，那我肯定不会去做的。」（2000年销售手册前言）
    - 「我们所有的成功，都来自于'本分+平常心'。」（2018年斯坦福交流）
