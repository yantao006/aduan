    phases:
    - period: 2010-2011
      summary: 早期（2010-2011）：在网易博客中系统讨论DCF，写有《现金流量折现法》专文，讨论折现率等技术话题。
    - period: 2012-2015
      summary: 中期（2012-2015）：在《投资的信仰》《复习一下》中将DCF升华为「买股票就是买公司」的自然延伸，强调思维框架而非技术工具。
    - period: 2019-2025
      summary: 近期（2019-2025）：坚持DCF框架，明确批驳市盈率决定论。2025年访谈中再次确认「决定投资不是由市盈率来决定的，是由你未来的现金流来决定的」。
    representative_quotes:
    - '"未来现金流的折现不是算法，是思维方式，不要企图拿计算器去算出来。当然，拿计算器算一下也没什么错。"'
    - '"公司未来现金流的折现就是公司的内在价值。应该在公司股价低于其内在价值时买入。"'
    - '"宁要模糊的精确，也不要精确的模糊。我觉得这就是毛估估的意思。"'
    related_concepts:
