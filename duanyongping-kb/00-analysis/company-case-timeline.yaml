    representative_quotes:
    - OPPO跟苹果比，我们在做对的事情上是一样的，但是在把事情做对上可能有些差距。但我们有积累。我们比大多数公司厉害。 ——2018年斯坦福交流
    - OPPO/vivo的Stop Doing List：没有销售部；不单独和客户谈价钱；不代工；没有有息贷款。 ——2018年斯坦福交流
    - 公司成功不是偶然的，坚持自己的"Stop Doing List"，筛合伙人，筛供货商，慢慢地就会攒下好圈子。 ——2018年斯坦福交流
