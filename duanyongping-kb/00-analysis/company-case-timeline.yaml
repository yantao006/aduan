    - 巴菲特
    representative_quotes:
    - 通用电气没有那么算。通用电气就是在2008年危机时，确实投了一下。但他们换CEO以后，我很快就退出了。按今天的想法，我是不会投通用电气的，我觉得通用电气的商业模式并不好。我那个时候还没有现在的水平。 ——2025年雪球访谈
    - 以前我觉得是在企业文化上（看好GE），因为商业模式其实我一直就没看懂，但企业文化我以前喜欢它们说的——"时代在变，唯一不变的是诚信"。后来我去看他们主页，我找不到这句话了。从找不到那句话开始，我就决定卖了。 ——2025年雪球访谈
    - 最早我是因为受杰克·韦尔奇的影响，觉得这家公司好神奇，后来发现其实也没有谁是神奇的。还好是卖了呀。我卖的那个时候4000多亿市值，现在可能都不到了。你想，我要是把那个换成苹果，多大差别啊。 ——2025年雪球访谈
    - 犯错误有时候也是会挣钱的，我觉得那是一个错误，回到今天我是不会买。它当然是个错误，因为它不符合我后来决定的，要符合商业模式和企业文化这两个过滤器。 ——2025年雪球访谈
    source_card: duanyongping-kb/03-企业与品牌/09-GE-通用电气.md
  富国银行/Wells Fargo:
    category: 学习案例
    relationship: learning-case (follow Buffett / copy homework)
    first_seen: '2009'
    last_seen: '2019'
    mentioned_count: 75
    core_for_timeline: false
    case_role: 金融企业风险与企业文化变化的警示样本。
    timeline:
    - period: 2009年
      event: 金融危机期间，跟随巴菲特买入富国银行。段永平的买入价格比巴菲特更低
    - period: 2010年
      event: 公开表示"不懂银行业"，富国银行是唯一的例外，因为跟着巴菲特
    - period: 2011年
      event: 跟随巴菲特买入美国银行（美银），同在"学习过程"中
    - period: 2019年
      event: 雪球上有人讨论富国银行时，段永平转发了关于"富国银行仍是一家强大的银行，没有失去任何客户"的讨论，未表示卖出
    validated_concepts:
    - 不懂不做
    - 抄作业
    - 能力圈
    - 安全边际
    - 金融股
    related_people:
    - 巴菲特
    - 芒格
    representative_quotes:
    - 我不了解银行业，所以只买了巴菲特了解的富国银行，如果他卖我就卖了，他不卖我也可能卖如果我能有更了解更便宜的目标的话。 ——2010年雪球发言汇总
    - 2009年，他跟随巴菲特买进了自己没有研究的富国银行。"金融危机垮下去的时候确实遍地是黄金，但我不知道哪个是地雷哪个是黄金。反正他也看过了，反正他也懂这个行当。" ——2010年人物报道
    - 同样是便宜，AIG从四五十块钱跌到5块钱，段永平也毫不动心。"为什么？巴菲特对保险业这么懂，他不买，我就不买。" ——2010年人物报道
    - 我始终没完全搞懂银行的业务的风险到底在哪儿。美国的一些大银行隔个10年8年就来一次大动荡，还没明白是怎么回事。 ——雪球发言，对银行股的长期态度
