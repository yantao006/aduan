    - 敢为天下后
    - 企业文化
    related_people:
    - 沈炜
    - 陈明永
    - 黄峥
    representative_quotes:
    - 我们企业的愿景目标就是让企业：**更健康、更长久的生存下去**。有别于很多企业讲的"要做大"、"要做500强"。 ——2005年步步高十周年记念文艺晚会
    - 我们之所以能够走到今天，最重要的一个原因就是我们犯的错误比竞争对手要少。我们在做对的事情上，做得比竞争对手要好。 ——2005年步步高十周年讲话
    - 核心价值观就是**"本分、诚信"**，还有**"团队、品质和以消费者为导向"**。 ——2005年步步高十周年讲话
    - 如果一个记者问我"50年以后报纸头版登一条关于你们公司的消息，你最希望是什么消息？"我说"任何消息"。哪怕坏消息，只要有任何消息，就表示我们还存在。 ——2005年步步高十周年讲话，99年底《亚洲周刊》采访
    source_card: duanyongping-kb/03-企业与品牌/01-步步高-BBK.md
