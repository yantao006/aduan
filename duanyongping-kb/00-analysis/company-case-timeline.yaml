    - 因为他们是CEO，我赞不赞成不影响他们做不做决定。当初就是沈炜觉得我们应该做手机。我那时候觉得我们做手机可能做不过松下、索尼、摩托罗拉。他说服我的是"手机其实是一个个性化非常强的东西"。 ——2025年雪球访谈，回顾vivo做手机决策
    - 我们过去的大部分竞争对手都消失了，我们还健在，道理也许就在此（不贷款、不用margin、做对的事）。 ——2018年斯坦福交流
    - 从功能机到智能机是被逼的。功能机卖不动了，我们差点都死在上面了。现金消耗得非常快，账面有七八十亿现金，看着往下掉，掉到最后就快到底了，又开始回来。如果我们要倒的话，不要倒得太难看。 ——2025年雪球访谈，回顾vivo生死危机
    - 我那时候还专门回去过，我投资这一块一直都没有动，就相当于我们的后备役部队一样。反正弟兄们也真的是很争气，做回来了。 ——2025年雪球访谈
